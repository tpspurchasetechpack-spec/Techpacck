<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Branch Locations</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold:#F5C842; --gold-deep:#D4A017; --gold-light:#FDE882; --gold-pale:#FFF8DC;
      --amber:#E8900A; --cream:#FFFBF0;
      --brown-dark:#3B1F00; --brown-mid:#7A4510; --brown-light:#C47B2B;
      --bg-dark:#0D0700; --bg-card:#12080A;
      --shadow-gold:rgba(212,160,23,0.35);
      --radius:18px; --radius-sm:12px;
      --transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{
      font-family:'Inter',sans-serif;
      background:linear-gradient(160deg,#0D0700 0%,#1a0c02 40%,#0f0500 100%);
      color:#e8d5b0; min-height:100vh; overflow-x:hidden;
    }

    /* ── Ambient glow bg ── */
    body::before{
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background:
        radial-gradient(ellipse 70% 50% at 20% 10%,rgba(212,160,23,0.06) 0%,transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 90%,rgba(232,144,10,0.05) 0%,transparent 55%),
        radial-gradient(ellipse 40% 60% at 50% 50%,rgba(255,140,0,0.03) 0%,transparent 70%);
    }

    /* ── Top accent bar ── */
    .top-bar{
      height:3px; width:100%;
      background:linear-gradient(90deg,transparent 0%,var(--gold-deep) 20%,var(--gold) 50%,var(--amber) 80%,transparent 100%);
      position:relative; z-index:10;
    }

    /* ── Hero ── */
    .hero{
      position:relative; z-index:2;
      padding:2.5rem 1.5rem 2rem;
      text-align:center;
      border-bottom:1px solid rgba(212,160,23,0.12);
    }
    .hero::after{
      content:''; position:absolute; bottom:0; left:10%; right:10%; height:1px;
      background:linear-gradient(90deg,transparent,rgba(212,160,23,0.4),transparent);
    }
    .hero-logo{
      font-size:2.6rem; margin-bottom:0.6rem;
      filter:drop-shadow(0 0 20px rgba(255,200,50,0.5));
      animation:pulse 3s ease-in-out infinite;
    }
    @keyframes pulse{0%,100%{filter:drop-shadow(0 0 16px rgba(255,200,50,0.4))} 50%{filter:drop-shadow(0 0 30px rgba(255,200,50,0.8))}}
    .hero-title{
      font-family:'Cinzel Decorative',serif;
      font-size:clamp(1.4rem,5vw,2.6rem);
      font-weight:900; letter-spacing:0.04em;
      color:var(--gold-light);
      text-shadow:0 0 40px rgba(245,200,66,0.5), 0 2px 0 rgba(0,0,0,0.5);
      line-height:1.2;
    }
    .hero-sub{
      font-family:'Cinzel',serif;
      font-size:clamp(0.6rem,1.8vw,0.78rem);
      color:rgba(253,232,130,0.6);
      letter-spacing:0.28em; text-transform:uppercase;
      margin-top:0.5rem;
    }
    .hero-divider{
      display:flex; align-items:center; justify-content:center;
      gap:0.6rem; margin-top:1rem;
    }
    .hd-line{width:50px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-deep));}
    .hd-line.r{background:linear-gradient(90deg,var(--gold-deep),transparent);}
    .hd-gem{width:5px;height:5px;background:var(--gold);transform:rotate(45deg);border-radius:1px;}

    /* ── Diya strip ── */
    
    
    .css-diya{display:flex;flex-direction:column;align-items:center;animation:flicker 2.2s ease-in-out infinite;}
    .css-diya:nth-child(2){animation-delay:0.4s;}
    .css-diya:nth-child(3){animation-delay:0.8s;}
    .css-diya:nth-child(4){animation-delay:1.2s;}
    .css-diya:nth-child(5){animation-delay:1.6s;}
    @keyframes flicker{0%,100%{filter:drop-shadow(0 0 5px #FFD700) brightness(1)}50%{filter:drop-shadow(0 0 12px #FF8C00) brightness(1.2)}}
    .flame{width:9px;height:14px;background:linear-gradient(to top,#FF4500,#FF8C00 40%,#FFD700 70%,#FFFACD);border-radius:50% 50% 30% 30%/60% 60% 40% 40%;animation:flameAnim 1.6s ease-in-out infinite;}
    @keyframes flameAnim{0%,100%{transform:scaleX(1) skewX(0deg)}33%{transform:scaleX(0.82) skewX(-9deg)}66%{transform:scaleX(1.1) skewX(6deg)}}
    .diya-body{width:22px;height:7px;background:linear-gradient(135deg,#D4A017,#8B4513,#D4A017);border-radius:0 0 50% 50%/0 0 100% 100%;box-shadow:0 2px 6px rgba(0,0,0,0.5);margin-top:1px;}
    .diya-base{width:26px;height:3px;background:#8B4513;border-radius:50%;opacity:0.6;}

    /* ── Tab bar ── */
    .tab-bar{
      position:sticky; top:0; z-index:20;
      display:flex; overflow-x:auto; scrollbar-width:none;
      background:rgba(10,5,0,0.92);
      backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(212,160,23,0.18);
      padding:0 0.5rem;
    }
    .tab-bar::-webkit-scrollbar{display:none;}
    .branch-tab{
      flex:1; min-width:88px; padding:1rem 0.6rem;
      border:none; background:transparent;
      font-family:'Cinzel',serif;
      font-size:clamp(0.6rem,2vw,0.75rem);
      font-weight:700; letter-spacing:0.08em;
      color:rgba(212,160,23,0.5);
      cursor:pointer; white-space:nowrap;
      border-bottom:2px solid transparent;
      transition:var(--transition);
      position:relative;
    }
    .branch-tab::after{
      content:''; position:absolute; bottom:-1px; left:50%; right:50%;
      height:2px; background:var(--gold);
      transition:var(--transition); border-radius:2px;
    }
    .branch-tab:hover{color:rgba(212,160,23,0.8);}
    .branch-tab.active{color:var(--gold-light);}
    .branch-tab.active::after{left:10%; right:10%;}

    /* ── Page body ── */
    .page-body{
      position:relative; z-index:2;
      max-width:700px; margin:0 auto;
      padding:1.2rem 1rem 5rem;
    }

    /* ── Branch card ── */
    .branch-card{
      background:linear-gradient(160deg,rgba(26,12,4,0.95) 0%,rgba(18,8,4,0.98) 100%);
      border:1px solid rgba(212,160,23,0.2);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
      animation:cardIn 0.4s cubic-bezier(0.34,1.2,0.64,1);
    }
    @keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}

    /* ── Card header ── */
    .card-header{
      padding:1.6rem 1.8rem 1.4rem;
      display:flex; align-items:center; gap:1.1rem;
      border-bottom:1px solid rgba(212,160,23,0.15);
      background:linear-gradient(135deg,rgba(212,160,23,0.06) 0%,transparent 60%);
      position:relative; overflow:hidden;
    }
    .card-header::before{
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,rgba(212,160,23,0.5),transparent);
    }
    .card-emblem{
      font-size:2.4rem; flex-shrink:0;
      filter:drop-shadow(0 0 10px rgba(255,215,0,0.6));
    }
    .card-title-group{flex:1;}
    .card-name{
      font-family:'Cinzel Decorative',serif;
      font-size:clamp(0.95rem,3.2vw,1.4rem);
      font-weight:700; color:var(--gold-light);
      letter-spacing:0.03em; line-height:1.3;
    }
    .card-tagline{
      font-size:0.75rem; color:rgba(212,160,23,0.55);
      letter-spacing:0.06em; margin-top:0.2rem;
      font-family:'Cinzel',serif; text-transform:uppercase;
    }
    .card-badge{
      background:linear-gradient(135deg,rgba(80,200,60,0.12),rgba(60,160,40,0.08));
      border:1px solid rgba(80,200,60,0.3);
      border-radius:20px; padding:0.3rem 0.75rem;
      font-size:0.62rem; font-weight:600;
      color:#7EE87E; letter-spacing:0.08em;
      font-family:'Cinzel',serif; text-transform:uppercase;
      white-space:nowrap;
    }

    /* ── Photo ── */
    .card-photo{
      width:100%; overflow:hidden;
      border-bottom:1px solid rgba(212,160,23,0.12);
      position:relative;
    }
    .card-photo img{width:100%;height:auto;display:block;transition:transform 0.5s ease;}
    .card-photo:hover img{transform:scale(1.02);}
    .photo-placeholder{
      height:220px; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:0.6rem;
      background:linear-gradient(135deg,rgba(212,160,23,0.04),transparent);
      border:1.5px dashed rgba(212,160,23,0.2);
    }
    .ph-icon{font-size:2.2rem; opacity:0.4;}
    .ph-text{color:rgba(212,160,23,0.4);font-size:0.72rem;letter-spacing:0.14em;font-family:'Cinzel',serif;}

    /* ── Card body ── */
    .card-body{padding:1.6rem 1.6rem 2rem;}

    /* ── About ── */
    .about-box{
      background:linear-gradient(135deg,rgba(212,160,23,0.06),rgba(212,160,23,0.02));
      border:1px solid rgba(212,160,23,0.18);
      border-radius:var(--radius-sm); padding:1.2rem 1.4rem;
      margin-bottom:1.5rem; position:relative; overflow:hidden;
    }
    .about-box::before{
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,rgba(212,160,23,0.4),transparent);
    }
    .about-label{
      font-family:'Cinzel',serif; font-size:0.6rem;
      letter-spacing:0.2em; color:var(--gold-deep);
      text-transform:uppercase; margin-bottom:0.5rem;
      display:flex; align-items:center; gap:0.4rem;
    }
    .about-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(212,160,23,0.3),transparent);}
    .about-text{color:rgba(253,232,130,0.75);font-size:0.93rem;line-height:1.75;font-style:italic;}

    /* ── Section heading ── */
    .section-heading{
      font-family:'Cinzel',serif; font-size:0.6rem;
      letter-spacing:0.22em; color:rgba(212,160,23,0.6);
      text-transform:uppercase; margin-bottom:1rem;
      display:flex; align-items:center; gap:0.6rem;
    }
    .section-heading::before{content:'';width:3px;height:12px;background:var(--gold-deep);border-radius:2px;}
    .section-heading::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(212,160,23,0.2),transparent);}

    /* ── Info grid ── */
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.9rem;margin-bottom:1.5rem;}
    @media(max-width:460px){.info-grid{grid-template-columns:1fr;}}
    .info-tile{
      background:rgba(255,255,255,0.025);
      border:1px solid rgba(212,160,23,0.15);
      border-radius:var(--radius-sm); padding:1rem 1.1rem;
      transition:var(--transition); position:relative; overflow:hidden;
    }
    .info-tile:hover{
      border-color:rgba(212,160,23,0.4);
      background:rgba(212,160,23,0.05);
      transform:translateY(-2px);
    }
    .info-tile-label{
      font-size:0.58rem; letter-spacing:0.2em;
      color:rgba(212,160,23,0.5); text-transform:uppercase;
      margin-bottom:0.45rem; font-weight:600;
    }
    .info-tile-value{color:#fff3cc;font-size:0.92rem;line-height:1.6;font-weight:500;word-break:break-word;}
    .info-tile-value.empty{color:rgba(120,80,40,0.6);font-style:italic;font-size:0.82rem;}

    /* ── Contact rows ── */
    .contact-section{margin-bottom:1.5rem;}
    .contact-row{
      display:flex; align-items:center; gap:0.9rem;
      padding:0.9rem 1.1rem;
      background:rgba(255,255,255,0.025);
      border:1px solid rgba(212,160,23,0.12);
      border-radius:var(--radius-sm); margin-bottom:0.6rem;
      text-decoration:none;
      transition:var(--transition);
    }
    .contact-row:hover{
      border-color:rgba(212,160,23,0.45);
      background:rgba(212,160,23,0.06);
      transform:translateX(3px);
    }
    .contact-icon{
      width:38px; height:38px; flex-shrink:0;
      background:rgba(212,160,23,0.1);
      border:1px solid rgba(212,160,23,0.2);
      border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      font-size:1rem; transition:var(--transition);
    }
    .contact-row:hover .contact-icon{background:rgba(212,160,23,0.18);}
    .contact-text{flex:1; min-width:0;}
    .contact-label{font-size:0.58rem;letter-spacing:0.16em;color:rgba(212,160,23,0.5);text-transform:uppercase;margin-bottom:0.18rem;font-weight:600;}
    .contact-value{color:#fff;font-size:0.93rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .contact-value.empty{color:rgba(120,80,40,0.5);font-style:italic;font-size:0.82rem;white-space:normal;}
    .contact-arrow{color:rgba(212,160,23,0.35);font-size:0.85rem;flex-shrink:0;transition:var(--transition);}
    .contact-row:hover .contact-arrow{color:var(--gold);transform:translateX(2px);}

    /* ── Bank section ── */
    .bank-section{margin-bottom:1.5rem;}
    .bank-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.9rem;}
    @media(max-width:460px){.bank-grid{grid-template-columns:1fr;}}
    .bank-tile{
      background:rgba(255,255,255,0.02);
      border:1px solid rgba(212,160,23,0.15);
      border-radius:var(--radius-sm); padding:1rem 1.1rem;
      position:relative; overflow:hidden;
      transition:var(--transition);
    }
    .bank-tile::after{
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,rgba(212,160,23,0.3),transparent);
    }
    .bank-tile:hover{border-color:rgba(212,160,23,0.4);background:rgba(212,160,23,0.04);transform:translateY(-2px);}
    .bank-tile.full{grid-column:1/-1;}
    @media(max-width:460px){.bank-tile.full{grid-column:auto;}}
    .bank-label{font-size:0.58rem;letter-spacing:0.2em;color:rgba(212,160,23,0.5);text-transform:uppercase;margin-bottom:0.5rem;font-weight:600;}
    .bank-value{color:#fff;font-size:0.97rem;font-weight:700;letter-spacing:0.04em;word-break:break-all;}
    .bank-value.empty{color:rgba(120,80,40,0.5);font-weight:400;font-style:italic;font-size:0.82rem;}

    /* ── GST number pill ── */
    .gst-pill{
      display:inline-flex; align-items:center; gap:0.5rem;
      background:rgba(212,160,23,0.08); border:1px solid rgba(212,160,23,0.25);
      border-radius:8px; padding:0.55rem 1rem;
      font-size:0.92rem; font-weight:700; color:#FFD68A;
      letter-spacing:0.06em; font-family:'Inter',monospace;
      width:100%; justify-content:center; margin-top:0.2rem;
    }
    .gst-label-icon{opacity:0.6; font-size:0.85rem;}

    /* ── GST Cert button ── */
    .gst-btn-wrap{margin-bottom:1.5rem;}
    .gst-cert-btn{
      width:100%; display:flex; align-items:center; gap:0.75rem;
      padding:1rem 1.3rem;
      background:linear-gradient(135deg,rgba(80,200,60,0.08),rgba(60,140,40,0.06));
      border:1px solid rgba(80,200,60,0.28);
      border-radius:var(--radius-sm); cursor:pointer;
      font-family:'Cinzel',serif; font-size:0.75rem; font-weight:700;
      letter-spacing:0.1em; color:#7EE87E;
      transition:var(--transition);
      position:relative; overflow:hidden;
    }
    .gst-cert-btn::before{
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg,rgba(80,200,60,0.0),rgba(80,200,60,0.08));
      opacity:0; transition:opacity 0.3s;
    }
    .gst-cert-btn:hover{border-color:rgba(80,200,60,0.6);color:#A8F5A8;transform:translateY(-1px);box-shadow:0 6px 20px rgba(80,200,60,0.12);}
    .gst-cert-btn:hover::before{opacity:1;}
    .gst-btn-icon{font-size:1.1rem;flex-shrink:0;}
    .gst-btn-text{flex:1;}
    .gst-btn-arrow{font-size:0.8rem;opacity:0.5;transition:var(--transition);}
    .gst-cert-btn:hover .gst-btn-arrow{opacity:1;transform:translateX(3px);}

    /* ── Social buttons ── */
    .social-row{display:flex;gap:0.6rem;flex-wrap:wrap;}
    .social-btn{
      display:flex; align-items:center; gap:0.4rem;
      padding:0.55rem 1rem; border-radius:8px;
      text-decoration:none; font-size:0.68rem; font-weight:700;
      letter-spacing:0.06em; border:1px solid; transition:var(--transition);
      font-family:'Cinzel',serif;
    }
    .social-btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,0.4);}
    .social-btn.youtube{background:rgba(255,0,0,0.07);border-color:rgba(255,0,0,0.25);color:#FF6B6B;}
    .social-btn.youtube:hover{background:rgba(255,0,0,0.14);border-color:rgba(255,0,0,0.6);}
    .social-btn.facebook{background:rgba(24,119,242,0.07);border-color:rgba(24,119,242,0.25);color:#60A5FA;}
    .social-btn.facebook:hover{background:rgba(24,119,242,0.14);border-color:rgba(24,119,242,0.6);}
    .social-btn.x-twitter{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.15);color:#ccc;}
    .social-btn.x-twitter:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.4);color:#fff;}
    .social-btn.instagram{background:rgba(225,48,108,0.07);border-color:rgba(225,48,108,0.25);color:#F472B6;}
    .social-btn.instagram:hover{background:rgba(225,48,108,0.14);border-color:rgba(225,48,108,0.6);}
    .social-icon{font-size:0.9rem;}

    /* ── GST Certificate Modal ── */
    .modal-overlay{
      position:fixed; inset:0; z-index:8000;
      background:rgba(0,0,0,0.88);
      backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center;
      padding:1rem; overflow-y:auto;
      animation:fadeIn 0.2s ease;
    }
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .modal-box{
      width:100%; max-width:520px;
      background:linear-gradient(160deg,#110800 0%,#1a0d02 100%);
      border:1px solid rgba(212,160,23,0.3);
      border-radius:20px; overflow:hidden;
      box-shadow:0 30px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.04);
      animation:modalIn 0.3s cubic-bezier(0.34,1.3,0.64,1);
    }
    @keyframes modalIn{from{opacity:0;transform:translateY(30px) scale(0.94)}to{opacity:1;transform:none}}
    .modal-header{
      padding:1.3rem 1.5rem;
      display:flex; align-items:center; justify-content:space-between;
      border-bottom:1px solid rgba(212,160,23,0.15);
      background:rgba(212,160,23,0.04);
    }
    .modal-title{
      font-family:'Cinzel Decorative',serif; font-size:0.85rem; font-weight:700;
      color:var(--gold-light); display:flex; align-items:center; gap:0.5rem;
    }
    .modal-close{
      width:30px; height:30px; border-radius:50%;
      background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
      color:#888; font-size:0.85rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:var(--transition);
    }
    .modal-close:hover{background:rgba(255,80,80,0.15);border-color:rgba(255,80,80,0.4);color:#ffaaaa;}
    .modal-body{padding:1.4rem;}

    /* ── Cert tabs ── */
    .cert-tabs{
      display:flex; gap:0.5rem; margin-bottom:1.2rem;
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(212,160,23,0.12);
      border-radius:10px; padding:0.3rem;
    }
    .cert-tab{
      flex:1; padding:0.6rem 1rem; border:none;
      background:transparent; border-radius:8px; cursor:pointer;
      font-family:'Cinzel',serif; font-size:0.68rem; font-weight:700;
      letter-spacing:0.08em; transition:var(--transition);
    }
    .cert-tab.andhra{color:#60A5FA;}
    .cert-tab.telangana{color:#C084FC;}
    .cert-tab.active{background:rgba(212,160,23,0.12);color:var(--gold-light);}

    /* ── Cert viewer ── */
    .cert-pane{}
    .cert-img-wrap{position:relative;border-radius:12px;overflow:hidden;border:1px solid rgba(212,160,23,0.2);}
    .cert-img-wrap img{width:100%;display:block;}
    .cert-pdf-wrap iframe{width:100%;height:420px;border:none;display:block;}
    .cert-toolbar{
      position:absolute; top:0.6rem; right:0.6rem;
      display:flex; gap:0.4rem;
    }

    (function trackVisit() {
      const visitId = Date.now().toString(36) + Math.random().toString(36).slice(2,6);
      window.__visitId = visitId;
      const arrivedAt = new Date();
      function fmtFull(d){return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
      function post(p){if(!SHEET_URL||SHEET_URL==="YOUR_APPS_SCRIPT_URL_HERE")return;fetch(SHEET_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(p)}).catch(()=>{});}
      function deviceType(){const w=window.innerWidth;if(w<=480)return"Mobile";if(w<=1024)return"Tablet";return"Desktop";}
      function browserName(){const ua=navigator.userAgent;if(/Edg\//.test(ua))return"Edge";if(/OPR\//.test(ua))return"Opera";if(/Chrome\//.test(ua))return"Chrome";if(/Safari\//.test(ua))return"Safari";if(/Firefox\//.test(ua))return"Firefox";return"Other";}
      fetch("https://ipapi.co/json/").then(r=>r.json()).then(geo=>{post({action:"visit",visitId,arrivalTime:fmtFull(arrivedAt),city:geo.city||"—",region:geo.region||"—",country:geo.country_name||"—",ip:geo.ip||"—",browser:browserName(),device:deviceType(),os:navigator.platform||"—",screenSize:`${screen.width}×${screen.height}`,language:navigator.language||"—",referrer:document.referrer||"Direct",pageURL:window.location.href});}).catch(()=>{post({action:"visit",visitId,arrivalTime:fmtFull(arrivedAt),city:"—",region:"—",country:"—",ip:"—",browser:browserName(),device:deviceType(),os:navigator.platform||"—",screenSize:`${screen.width}×${screen.height}`,language:navigator.language||"—",referrer:document.referrer||"Direct",pageURL:window.location.href});});
      function logExit(){const s=Math.round((Date.now()-arrivedAt.getTime())/1000);post({action:"exit",visitId,exitTime:new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),timeSpent:`${Math.floor(s/60)}m ${s%60}s`});}
      window.addEventListener("beforeunload",logExit);

        setErr(''); setLoading(true);
        if (SHEET_URL && SHEET_URL !== "YOUR_APPS_SCRIPT_URL_HERE") {
          fetch(SHEET_URL, {method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},
            body:JSON.stringify({action:"identify",visitId,name:name.trim(),contact:contact.trim(),type:isEmail(contact)?"Email":"Phone"})
          }).catch(()=>{});
        }
        setLoading(false);
        onEnter({ name: name.trim(), contact: contact.trim() });
      };

      return (
        <div className="welcome-overlay">
          <div className="welcome-card">
            <div className="wc-header">
              <div className="wc-logo">🏛️</div>
              <div className="wc-title">Welcome</div>
              <div className="wc-sub">Please identify yourself to continue</div>
            </div>
            <div className="wc-body">
              <div className="wc-field">
                <div className="wc-label">👤 Your Name</div>
                <input className="wc-input" type="text" placeholder="Enter your full name"
                  value={name} autoFocus
                  onChange={e=>setName(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&submit()}/>
              </div>
              <div className="wc-field">
                <div className="wc-label">✉️ Email or 📱 Phone</div>
                <input className="wc-input" type="text" placeholder="you@email.com  or  +91 98765 43210"
                  value={contact}
                  onChange={e=>setContact(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&submit()}/>
                <div className="wc-hint">Either one works — your choice.</div>
              </div>
              {err && <div className="wc-err">⚠️ {err}</div>}
              <button className="wc-btn" onClick={submit} disabled={loading}>
                {loading ? '🪔 Entering…' : '🪔 Enter'}
              </button>
              <div className="wc-footer">Your information is kept private and never shared.</div>
            </div>
          </div>
        </div>
      );
    }

    // ── Bottom Social Bar ────────────────────────────────────────
    function BottomSocialBar({ branch }) {
      const links = [
        { cls:"yt", icon:"▶", label:"YouTube",   key:"youtube"   },
        { cls:"fb", icon:"f", label:"Facebook",  key:"facebook"  },
        { cls:"tw", icon:"𝕏", label:"X",         key:"twitter"   },
        { cls:"ig", icon:"◎", label:"Instagram", key:"instagram" },
      ];
      return (
        <div className="bottom-social-bar">
          {links.map(s => {
            const url = branch && branch[s.key];
            return url
              ? <a key={s.key} className={`bsb-btn ${s.cls}`} href={url} target="_blank" rel="noopener noreferrer">
                  <span className="bsb-icon">{s.icon}</span>
                  <span className="bsb-label">{s.label}</span>
                </a>
              : <span key={s.key} className={`bsb-btn ${s.cls} disabled`}>
                  <span className="bsb-icon">{s.icon}</span>
                  <span className="bsb-label">{s.label}</span>
                </span>;
          })}
        </div>
      );
    }

    // ── Main App ─────────────────────────────────────────────────
    function App() {
      const [active,  setActive]  = useState("b1");
      const [entered, setEntered] = useState(false);
      const [visitId, setVisitId] = useState(null);
      const branch = BRANCHES.find(b => b.id === active);

      useEffect(() => {
        const check = () => { if (window.__visitId) setVisitId(window.__visitId); else setTimeout(check,100); };
        check();
      }, []);

      if (!entered) return <WelcomeScreen visitId={visitId} onEnter={()=>setEntered(true)}/>;

      return (
        <>
          <div className="top-bar"/>
          <div className="tab-bar">
            {BRANCHES.map(b=>(
              <button key={b.id}
                className={`branch-tab ${active===b.id?"active":""}`}
                onClick={()=>setActive(b.id)}>
                {b.label}
              </button>
            ))}
          </div>
          <div className="page-body" style={{paddingBottom:"5.5rem"}}>
            {branch && <BranchCard key={branch.id} branch={branch}/>}
          </div>
          <BottomSocialBar branch={branch}/>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
